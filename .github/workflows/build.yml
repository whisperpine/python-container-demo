name: Build Container Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: build and push to ghcr
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_short }}
          platforms: linux/amd64,linux/arm64
          cache-to: type=gha,mode=max
          cache-from: type=gha

  scan-cve:
    name: scan CVE on the image
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: cachix/install-nix-action@v31
      - name: Run Trivy vulnerability scanner
        shell: nix shell nixpkgs#trivy --quiet --command bash {0}
        run: |
          trivy --quiet image ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.sha_short }} \
            --output trivy-image-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --exit-code 1
      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image-scan
